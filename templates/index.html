<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>豆瓣电影Top250</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 80%;
            background-color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>

</head>
<body>

<h1>🎬 豆瓣电影 Top250</h1>
<form method="get">
    <input type="text" name="q" placeholder="搜索电影" value="{{ keyword or '' }}">
    <button type="submit">搜索</button>
</form>
<br>
<table>
    <tr>
        <th>标题</th>
        <th>评分</th>
        <th>简介</th>
        <th>链接</th>
    </tr>

    {% for movie in movies %}
    <tr>
        <td>{{ movie.title }}</td>
        <td>{{ movie.rating }}</td>
        <td>{{ movie.quote }}</td>
        <td>
            <a href="{{ movie.link }}" target="_blank">查看</a>
        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
