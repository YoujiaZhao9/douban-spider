<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>豆瓣电影Top250</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h1>🎬 豆瓣电影 Top250</h1>

<div class="container">

    <div class="search-box">
        <form method="get">
            <input type="text" name="q" placeholder="搜索电影" value="{{ keyword or '' }}">
            <button type="submit">搜索</button>
        </form>
    </div>

    <div class="cards">
        {% for movie in movies %}
        <div class="card">
            <div class="title">{{ movie.title }}</div>
            <div class="rating">⭐ {{ movie.rating }}</div>
            <div class="quote">{{ movie.quote }}</div>
            <a href="{{ movie.link }}" target="_blank">查看详情</a>
        </div>
        {% endfor %}
    </div>

</div>

</body>
</html>
